services:
  MarkIt-Backend:
    image: markit-backend
    build:
      context: ./Backend
      target: development
    env_file: .env
    command: mvn spring-boot:run
    volumes:
      - ./Backend:/usr/app
      - /usr/app/node_modules
    ports:
      - $BACKEND_LOCAL_PORT:$BACKEND_CONTAINER_PORT
    depends_on:
      - MarkItDB-mysql
    environment:
      - MYSQL_HOST=MarkItDB-mysql
  
  MarkItDB-mysql:
    image: mysql
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: $MYSQL_ROOT_PASSWORD
      MYSQL_DATABASE: $MYSQL_DATABASE
      MYSQL_ROOT_HOST: "%"
    ports:
      - $MYSQL_LOCAL_PORT:$MYSQL_DOCKER_PORT
    volumes:
      - mysql:/var/lib/mysql
      - mysql_config:/etc/mysql

volumes:
  mysql:
  mysql_config:
